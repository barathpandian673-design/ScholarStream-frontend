<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>My Submissions — ScholarStream</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Shared Stylesheets -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <!-- Reuses Browse Grid CSS -->
    <link rel="stylesheet" href="css/papers.css">
</head>
<body>
    <!-- Static Navigation Header -->
    <nav class="navbar" id="navbar">
        <div class="container navbar-container">
            <a href="index.html" class="nav-brand">
                <span class="brand-accent">Scholar</span>Stream
            </a>
            <div class="nav-links">
                <a href="papers.html" class="nav-link">Browse</a>
                <a href="bookmarks.html" class="nav-link auth-only hidden">Bookmarks</a>
                <a href="dashboard.html" class="nav-link auth-only hidden">Dashboard</a>
                <a href="my-papers.html" class="nav-link author-only hidden">My Papers</a>
                <a href="upload.html" class="nav-link author-only hidden">Upload</a>
                <a href="review.html" class="nav-link reviewer-only hidden">Review Queue</a>
                <a href="admin.html" class="nav-link admin-only hidden">Admin Panel</a>
            </div>
            <form class="nav-search-form" action="search.html" method="GET">
                <div class="search-input-wrapper">
                    <input type="text" name="q" placeholder="Search papers..." required>
                    <button type="submit" aria-label="Search"><i data-lucide="search"></i></button>
                </div>
            </form>
            <div class="nav-actions">
                <div class="guest-only">
                    <a href="login.html" class="btn btn-outline btn-sm">Login</a>
                    <a href="register.html" class="btn btn-primary btn-sm">Register</a>
                </div>
                <div class="user-menu-wrapper hidden">
                    <button class="user-menu-btn">
                        <span class="user-avatar">U</span>
                        <span class="user-name">User</span>
                        <i data-lucide="chevron-down"></i>
                    </button>
                    <div class="user-dropdown">
                        <div class="dropdown-header">
                            <p class="dropdown-fullname">User Full Name</p>
                            <p class="dropdown-email">user@example.com</p>
                            <span class="badge badge-outline">Role</span>
                        </div>
                        <a href="dashboard.html" class="dropdown-item"><i data-lucide="layout-dashboard"></i> Dashboard</a>
                        <a href="bookmarks.html" class="dropdown-item"><i data-lucide="bookmark"></i> Bookmarks</a>
                        <hr>
                        <button id="btn-logout" class="dropdown-item text-danger"><i data-lucide="log-out"></i> Logout</button>
                    </div>
                </div>
                <button class="mobile-menu-toggle btn-icon" aria-label="Toggle Mobile Menu">
                    <i data-lucide="menu"></i>
                </button>
            </div>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main>
        <div class="container">
            <div class="papers-content">
                <div class="flex-between papers-header-row">
                    <h2>My Research Submissions</h2>
                    <a href="upload.html" class="btn btn-primary btn-sm"><i data-lucide="upload-cloud"></i> Submit New Paper</a>
                </div>
                
                <div class="papers-grid mt-4" id="mypapers-grid">
                    <!-- Papers loaded dynamically -->
                    <div class="spinner-wrapper flex-center" style="grid-column: 1/-1;">
                        <div class="spinner"></div>
                    </div>
                </div>
            </div>
        </div>

        <!-- Edit Modal Overlay -->
        <div class="modal-overlay" id="edit-paper-modal">
            <div class="modal-content">
                <div class="modal-header">
                    <h3>Edit Manuscript Metadata</h3>
                    <button class="btn-icon" id="btn-close-modal" aria-label="Close"><i data-lucide="x"></i></button>
                </div>
                <div class="modal-body">
                    <form id="edit-paper-form">
                        <div id="modal-error-container" class="alert alert-error hidden"></div>
                        <input type="hidden" id="edit-paper-id">

                        <div class="form-group">
                            <label for="edit-title" class="form-label">Paper Title *</label>
                            <input type="text" id="edit-title" class="form-input" required>
                        </div>

                        <div class="form-group">
                            <label for="edit-abstract" class="form-label">Abstract *</label>
                            <textarea id="edit-abstract" class="form-textarea" required></textarea>
                        </div>

                        <div class="form-group">
                            <label for="edit-keywords" class="form-label">Keywords</label>
                            <input type="text" id="edit-keywords" class="form-input" placeholder="e.g. AI, Machine Learning (comma-separated)">
                        </div>

                        <div class="form-group">
                            <label for="edit-version" class="form-label">Version</label>
                            <input type="text" id="edit-version" class="form-input" placeholder="1.0">
                        </div>

                        <div class="flex-end gap-md mt-4">
                            <button type="button" class="btn btn-outline" id="btn-cancel-modal">Cancel</button>
                            <button type="submit" class="btn btn-primary" id="btn-save-edit">
                                <span>Save Changes</span>
                                <div class="spinner spinner-sm hidden" id="modal-spinner" style="width: 20px; height: 20px; border-width: 2px;"></div>
                            </button>
                        </div>
                    </form>
                </div>
            </div>
        </div>
    </main>

    <!-- Static Footer -->
    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-logo">
                <span class="brand-accent">Scholar</span>Stream
            </div>
            <div class="footer-copy">
                &copy; 2026 ScholarStream. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Unified API JS Module -->
    <script src="js/api.js"></script>
    
    <!-- Page Specific Inline Logic -->
    <script>
        let myPapersList = [];

        document.addEventListener('DOMContentLoaded', () => {
            if (guard.requireRole([ROLES.AUTHOR, ROLES.ADMIN])) {
                loadMyPapers();
                initModalEvents();
            }
        });

        async function loadMyPapers() {
            const grid = document.getElementById('mypapers-grid');
            if (!grid) return;

            const user = auth.getUser();
            grid.innerHTML = '';
            const loader = document.createElement('div');
            loader.className = 'spinner-wrapper flex-center';
            loader.style.gridColumn = '1/-1';
            const spinner = document.createElement('div');
            spinner.className = 'spinner';
            loader.appendChild(spinner);
            grid.appendChild(loader);

            try {
                const papers = await api.getAllPapers();
                myPapersList = papers.filter(p => p.author && p.author.id.toString() === user.id.toString());
                grid.innerHTML = '';

                if (myPapersList.length === 0) {
                    const empty = document.createElement('div');
                    empty.className = 'empty-state';
                    empty.style.gridColumn = '1/-1';
                    
                    const icon = document.createElement('i');
                    icon.setAttribute('data-lucide', 'folder-open');
                    empty.appendChild(icon);

                    const h3 = document.createElement('h3');
                    h3.textContent = 'No submissions found';
                    empty.appendChild(h3);

                    const p = document.createElement('p');
                    p.className = 'text-muted mt-2';
                    p.textContent = 'You haven\'t uploaded any research paper yet.';
                    empty.appendChild(p);

                    const uploadBtn = document.createElement('a');
                    uploadBtn.href = 'upload.html';
                    uploadBtn.className = 'btn btn-primary mt-3';
                    
                    const uploadIcon = document.createElement('i');
                    uploadIcon.setAttribute('data-lucide', 'upload-cloud');
                    uploadBtn.appendChild(uploadIcon);
                    
                    const uploadText = document.createTextNode(' Upload Paper');
                    uploadBtn.appendChild(uploadText);
                    empty.appendChild(uploadBtn);

                    grid.appendChild(empty);
                    if (window.lucide) lucide.createIcons();
                    return;
                }

                myPapersList.forEach(paper => {
                    const categoryName = paper.category ? paper.category.name : 'Uncategorized';
                    const dateFormatted = utils.formatDate(paper.uploadDate);
                    
                    const card = document.createElement('div');
                    card.className = 'card paper-card';

                    const cardHeader = document.createElement('div');
                    cardHeader.className = 'card-header';
                    
                    const badge = utils.createStatusBadgeElement(paper.status);
                    cardHeader.appendChild(badge);

                    const categorySpan = document.createElement('span');
                    categorySpan.className = 'paper-category';
                    categorySpan.textContent = categoryName;
                    cardHeader.appendChild(categorySpan);
                    card.appendChild(cardHeader);

                    const cardBody = document.createElement('div');
                    cardBody.className = 'card-body';

                    const title = document.createElement('h3');
                    title.className = 'paper-title';
                    title.textContent = paper.title;
                    cardBody.appendChild(title);

                    const author = document.createElement('p');
                    author.className = 'paper-author';
                    author.textContent = `Uploaded on ${dateFormatted} | Version ${paper.version || '1.0'}`;
                    cardBody.appendChild(author);

                    const abstract = document.createElement('p');
                    abstract.className = 'paper-abstract';
                    abstract.textContent = utils.truncateText(paper.abstractText, 150);
                    cardBody.appendChild(abstract);

                    if (paper.flagged) {
                        const flaggedP = document.createElement('p');
                        flaggedP.className = 'text-danger mt-2';
                        const strongFlag = document.createElement('strong');
                        strongFlag.textContent = 'Flagged Reason: ';
                        flaggedP.appendChild(strongFlag);
                        const flagText = document.createTextNode(paper.flagReason);
                        flaggedP.appendChild(flagText);
                        cardBody.appendChild(flaggedP);
                    }
                    card.appendChild(cardBody);

                    const cardFooter = document.createElement('div');
                    cardFooter.className = 'card-footer';

                    const editBtn = document.createElement('button');
                    editBtn.className = 'btn btn-primary btn-sm';
                    
                    const editIcon = document.createElement('i');
                    editIcon.setAttribute('data-lucide', 'edit');
                    editBtn.appendChild(editIcon);
                    
                    const editBtnText = document.createTextNode(' Edit Info');
                    editBtn.appendChild(editBtnText);
                    
                    editBtn.addEventListener('click', () => {
                        openEditModal(paper.id);
                    });
                    cardFooter.appendChild(editBtn);

                    const readBtn = document.createElement('a');
                    readBtn.href = `paper-detail.html?id=${paper.id}`;
                    readBtn.className = 'btn btn-outline btn-sm';
                    readBtn.textContent = 'Read Details';
                    cardFooter.appendChild(readBtn);
                    card.appendChild(cardFooter);

                    grid.appendChild(card);
                });

                if (window.lucide) lucide.createIcons();

            } catch (error) {
                console.error('Failed to load submissions:', error);
                grid.innerHTML = '';
                const empty = document.createElement('div');
                empty.className = 'empty-state';
                empty.style.gridColumn = '1/-1';
                const p = document.createElement('p');
                p.textContent = 'Failed to load submissions.';
                empty.appendChild(p);
                grid.appendChild(empty);
            }
        }

        function openEditModal(paperId) {
            const paper = myPapersList.find(p => p.id.toString() === paperId.toString());
            if (!paper) return;

            document.getElementById('edit-paper-id').value = paper.id;
            document.getElementById('edit-title').value = paper.title;
            document.getElementById('edit-abstract').value = paper.abstractText;
            document.getElementById('edit-keywords').value = paper.keywords || '';
            document.getElementById('edit-version').value = paper.version || '1.0';

            const modal = document.getElementById('edit-paper-modal');
            modal.classList.add('show');
        }

        function closeEditModal() {
            const modal = document.getElementById('edit-paper-modal');
            modal.classList.remove('show');
            
            const err = document.getElementById('modal-error-container');
            err.classList.add('hidden');
            err.textContent = '';
        }

        function initModalEvents() {
            document.getElementById('btn-close-modal').addEventListener('click', closeEditModal);
            document.getElementById('btn-cancel-modal').addEventListener('click', closeEditModal);
            
            document.getElementById('edit-paper-modal').addEventListener('click', (e) => {
                if (e.target.id === 'edit-paper-modal') {
                    closeEditModal();
                }
            });

            const form = document.getElementById('edit-paper-form');
            const errContainer = document.getElementById('modal-error-container');
            const btnSave = document.getElementById('btn-save-edit');
            const spinner = document.getElementById('modal-spinner');

            if (!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();

                const id = document.getElementById('edit-paper-id').value;
                const title = document.getElementById('edit-title').value.trim();
                const abstractText = document.getElementById('edit-abstract').value.trim();
                const keywords = document.getElementById('edit-keywords').value.trim();
                const version = document.getElementById('edit-version').value.trim();

                errContainer.classList.add('hidden');
                btnSave.disabled = true;
                spinner.classList.remove('hidden');

                try {
                    await api.updatePaper(id, {
                        title,
                        abstractText,
                        keywords,
                        version
                    });

                    utils.showToast('Paper details updated successfully.', 'success');
                    closeEditModal();
                    loadMyPapers();

                } catch (err) {
                    console.error('Update failed:', err);
                    errContainer.textContent = err.message || 'Failed to update metadata. Please check inputs.';
                    errContainer.classList.remove('hidden');
                } finally {
                    btnSave.disabled = false;
                    spinner.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
