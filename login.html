<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login — ScholarStream</title>
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    
    <!-- Shared Stylesheets -->
    <link rel="stylesheet" href="css/global.css">
    <link rel="stylesheet" href="css/components.css">
    <link rel="stylesheet" href="css/navbar.css">
    <link rel="stylesheet" href="css/footer.css">
    
    <!-- Page Specific Stylesheet -->
    <link rel="stylesheet" href="css/auth.css">
</head>
<body>
    <!-- Static Navigation Header -->
    <nav class="navbar" id="navbar">
        <div class="container navbar-container" style="justify-content: center;">
            <a href="index.html" class="nav-brand">
                <span class="brand-accent">Scholar</span>Stream
            </a>
        </div>
    </nav>

    <!-- Main Content Area -->
    <main class="auth-main flex-center">
        <div class="container auth-container auth-split">
            <div class="card auth-card">
                <div class="auth-header" style="text-align: center;">
                    <h2>Welcome Back</h2>
                    <p class="text-muted">Sign in to manage papers, comment or review</p>
                </div>
                
                <form id="login-form">
                    <div id="error-container" class="alert alert-error hidden"></div>
                    
                    <div class="form-group">
                        <label for="username" class="form-label">Username</label>
                        <input type="text" id="username" class="form-input" required placeholder="e.g. john_doe">
                    </div>
                    
                    <div class="form-group">
                        <label for="password" class="form-label">Password</label>
                        <input type="password" id="password" class="form-input" required placeholder="••••••••">
                    </div>
                    
                    <button type="submit" class="btn btn-primary btn-block mt-4" id="btn-submit">
                        <span>Sign In</span>
                        <div class="spinner spinner-sm hidden" id="login-spinner" style="width: 20px; height: 20px; border-width: 2px;"></div>
                    </button>
                </form>
                
                <div class="auth-footer text-center mt-4">
                    <p class="text-muted">Don't have an account? <a href="register.html">Sign up today</a></p>
                </div>
            </div>
            
            <div class="auth-logo-side hidden-mobile">
                <img src="images/logo.png" alt="ScholarStream Logo" style="width: 250px; height: auto; border-radius: 50%;">
                <h3 style="margin-top: 1.5rem; font-size: 1.5rem; color: var(--color-text-main);">ScholarStream</h3>
                <p style="color: var(--color-text-muted);">The open-access research repository</p>
            </div>
        </div>
    </main>

    <!-- Static Footer -->
    <footer class="footer">
        <div class="container footer-container">
            <div class="footer-logo">
                <span class="brand-accent">Scholar</span>Stream
            </div>
            <div class="footer-copy">
                &copy; 2026 ScholarStream. All rights reserved.
            </div>
        </div>
    </footer>

    <!-- Lucide Icons CDN -->
    <script src="https://unpkg.com/lucide@latest"></script>
    
    <!-- Unified API JS Module -->
    <script src="js/api.js"></script>
    
    <!-- Page Specific Inline Logic -->
    <script>
        document.addEventListener('DOMContentLoaded', () => {
            guard.redirectIfLoggedIn();
            initLoginForm();
        });

        function initLoginForm() {
            const form = document.getElementById('login-form');
            const errorContainer = document.getElementById('error-container');
            const btnSubmit = document.getElementById('btn-submit');
            const spinner = document.getElementById('login-spinner');

            if (!form) return;

            form.addEventListener('submit', async (e) => {
                e.preventDefault();
                
                const username = document.getElementById('username').value.trim();
                const password = document.getElementById('password').value;

                // Reset error state
                errorContainer.classList.add('hidden');
                errorContainer.textContent = '';

                // Show spinner & disable button
                btnSubmit.disabled = true;
                spinner.classList.remove('hidden');

                try {
                    const data = await api.loginUser(username, password);
                    
                    // Extract user details to store
                    const user = {
                        id: data.id,
                        username: data.username,
                        email: data.email,
                        roles: data.roles
                    };

                    // Save to local storage
                    auth.saveAuth(data.token, user);
                    
                    // Success Toast and redirect
                    utils.showToast('Login successful!', 'success');
                    setTimeout(() => {
                        window.location.href = 'dashboard.html';
                    }, 1000);

                } catch (err) {
                    console.error('Login form error:', err);
                    errorContainer.textContent = err.message || 'Invalid username or password. Please try again.';
                    errorContainer.classList.remove('hidden');
                    btnSubmit.disabled = false;
                    spinner.classList.add('hidden');
                }
            });
        }
    </script>
</body>
</html>
